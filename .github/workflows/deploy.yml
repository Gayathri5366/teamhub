# ─────────────────────────────────────────────────────────────────────────────
# TeamHub CI/CD Pipeline
# NCI MSc Cloud Computing – Cloud DevOpsSec CA
#
# Architecture (per lecture notes – Dr Faithful C. Onwuegbuche):
#   Dev Machine → GitHub → GitHub Actions → AWS EC2 → Gunicorn → Django App
#
# Pipeline Stages:
#   1. lint          – Flake8 static analysis
#   2. security      – Bandit SAST + Safety CVE check
#   3. test          – Django unit tests + coverage (min 60%)
#   4. deploy        – SSH into EC2, git pull, restart Gunicorn
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   EC2_HOST     → EC2 Public IPv4 address  (e.g. 18.204.220.138)
#   EC2_SSH_KEY  → Contents of deploy_key   (private key, including BEGIN/END)
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy TeamHub to EC2

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ── Stage 1: Lint ──────────────────────────────────────────────────────────
  lint:
    name: "Stage 1 – Flake8 Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Flake8 – fail on syntax/import errors
        run: |
          flake8 . --count --select=E9,F63,F7,F82 \
            --show-source --statistics \
            --exclude=venv,staticfiles,migrations

      - name: Flake8 – style warnings (non-blocking)
        run: |
          flake8 . --count --max-line-length=120 \
            --exclude=venv,staticfiles,migrations \
            --statistics --exit-zero

  # ── Stage 2: Security Analysis ────────────────────────────────────────────
  security:
    name: "Stage 2 – Security Analysis (Bandit + Safety)"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Bandit SAST – scan for vulnerabilities
        run: |
          bandit -r . \
            -x ./tests,./staticfiles,./venv,./.git \
            --severity-level medium \
            -f json -o bandit-report.json || true
          bandit -r . \
            -x ./tests,./staticfiles,./venv,./.git \
            --severity-level medium || true

      - name: Safety – check dependencies for known CVEs
        run: safety check --full-report || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json

  # ── Stage 3: Unit Tests + Coverage ───────────────────────────────────────
  test:
    name: "Stage 3 – Unit Tests & Coverage"
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage

      - name: Run migrations
        run: python manage.py migrate --noinput
        env:
          DJANGO_SETTINGS_MODULE: teamhub.settings
          DEBUG: 'True'

      - name: Run tests with coverage
        run: |
          coverage run --source='.' manage.py test tests/ --verbosity=2
          coverage report --fail-under=60
          coverage xml -o coverage.xml
        env:
          DJANGO_SETTINGS_MODULE: teamhub.settings
          DEBUG: 'True'

      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ── Stage 4: Deploy to AWS EC2 via SSH ────────────────────────────────────
  # Only runs on push to main (not on pull requests)
  deploy:
    name: "Stage 4 – Deploy to AWS EC2"
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/teamhub
            git pull origin main
            source venv/bin/activate
            pip install -r requirements.txt
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput
            sudo systemctl restart gunicorn
            echo "TeamHub deployed successfully"
