{% extends "base.html" %}
{% block title %}Remove Member – TeamHub{% endblock %}
{% block page_title %}Remove Member{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card" style="border-color:#fde68a;">
      <div class="card-body" style="padding:28px;text-align:center;">
        <div style="width:56px;height:56px;border-radius:16px;background:#fef3c7;display:flex;align-items:center;justify-content:center;font-size:24px;color:#f59e0b;margin:0 auto 16px;">
            <i class="bi bi-person-dash"></i>
        </div>
        <h5 style="font-weight:700;margin-bottom:8px;">Remove {{ member.user.username }}?</h5>
        <p style="color:#64748b;font-size:14px;">They will lose access to <strong>{{ space.name }}</strong> immediately.</p>
        <form method="post" class="d-flex gap-2 justify-content-center mt-4">
          {% csrf_token %}
          <button type="submit" class="btn btn-warning">Yes, Remove</button>
          <a href="{% url 'space_detail' space.pk %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
